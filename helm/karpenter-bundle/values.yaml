# ─── BUNDLE-ONLY ─────────────────────────────────────────────────────────────
# These values are used by the bundle chart only and never forwarded to the workload chart.
ociRepositoryUrl: oci://gsoci.azurecr.io/charts/giantswarm/karpenter
clusterID: ""
region: ""
workersIamRole: ""

# ─── UPSTREAM ────────────────────────────────────────────────────────────────
# These values are transformed and routed under the `upstream:` key to the workload chart.
controller:
  image:
    registry: gsoci.azurecr.io
    repository: giantswarm/karpenter-controller
    tag: "1.8.1"
    digest: "sha256:35044629d7b890852fd770a8f69b303f3cbbd5695beef5af670faab1da269b17"
  resources:
    requests:
      cpu: 0.1
      memory: 50Mi
    limits:
      cpu: 1
      memory: 1Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

settings:
  clusterName: ""
  interruptionQueue: ""
  featureGates:
    nodeRepair: true
    spotToSpotConsolidation: true
    staticCapacity: true

proxy:
  http: ""
  https: ""
  noProxy: ""

# ─── EXTRAS ──────────────────────────────────────────────────────────────────
# These values are forwarded at top level (not under upstream:) to the workload chart.
podLogs:
  enabled: false
  tenant: ""

global:
  podSecurityStandards:
    enforced: false
