kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: karpenter
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karpenter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "karpenter.selectorLabels" . | nindent 6 }}
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
  egress:
    - {}
  policyTypes:
    - Egress
    - Ingress
